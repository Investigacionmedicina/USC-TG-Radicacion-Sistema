<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USC - Radicación TG 2026</title>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body>
    <div id="root"></div>
    <script>
        const e = React.createElement;
        const { useState, useEffect } = React;

        function generarRadicado(fase) {
            const ahora = new Date();
            const año = ahora.getFullYear();
            const mes = String(ahora.getMonth() + 1).padStart(2, '0');
            const contador = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
            return `USCTg-${fase}-${año}-${mes}-${contador}`;
        }

        function LoginPage({ onLogin }) {
            const [email, setEmail] = useState('');
            const [pass, setPass] = useState('');
            const [show, setShow] = useState(false);

            const handle = (evt) => {
                evt.preventDefault();
                if(!email || !pass) { alert('Completa campos'); return; }
                if(email === 'investigacionmedicina@usc.edu.co' && pass === 'Investigacion2026$') {
                    onLogin('admin', email);
                } else if(email.endsWith('@usc.edu.co')) {
                    onLogin('student', email);
                } else {
                    alert('Email debe ser @usc.edu.co');
                }
            };

            return e('div', { style: {background: 'linear-gradient(135deg, #003d82 0%, #1a5f9b 100%)'}, className: 'min-h-screen flex items-center justify-center p-4' },
                e('div', { className: 'bg-white rounded-2xl shadow-2xl w-full max-w-md p-8' },
                    e('div', { className: 'text-center mb-8' },
                        e('div', { className: 'w-16 h-16 bg-blue-600 rounded-lg mx-auto mb-4 flex items-center justify-center' },
                            e('span', { className: 'text-white font-bold text-xl' }, 'USC')
                        ),
                        e('h1', { className: 'text-3xl font-bold text-gray-800 mb-2' }, 'Radicación TG'),
                        e('p', { className: 'text-gray-600 text-sm' }, 'Sistema 2026 - Medicina')
                    ),
                    e('form', { onSubmit: handle, className: 'space-y-4' },
                        e('div', {},
                            e('label', { className: 'block text-sm font-medium text-gray-700 mb-2' }, 'Correo'),
                            e('input', { type: 'email', value: email, onChange: (x) => setEmail(x.target.value), placeholder: 'tu@usc.edu.co', className: 'w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600' })
                        ),
                        e('div', {},
                            e('label', { className: 'block text-sm font-medium text-gray-700 mb-2' }, 'Contraseña'),
                            e('div', { className: 'relative' },
                                e('input', { type: show ? 'text' : 'password', value: pass, onChange: (x) => setPass(x.target.value), placeholder: '••••••••', className: 'w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-600' }),
                                e('button', { type: 'button', onClick: () => setShow(!show), className: 'absolute right-3 top-2.5 text-gray-500' }, show ? '🙈' : '👁️')
                            )
                        ),
                        e('button', { type: 'submit', className: 'w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700' }, 'Acceder')
                    ),
                    e('div', { className: 'mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200' },
                        e('p', { className: 'font-semibold text-blue-900 text-sm' }, 'ℹ️ Información:'),
                        e('p', { className: 'text-blue-800 text-sm mt-2' }, 'Coordinadora: Contacta al admin'),
                        e('p', { className: 'text-blue-800 text-sm' }, 'Estudiante: Tu correo @usc.edu.co')
                    )
                )
            );
        }

        function StudentFase1({ email, onBack, onSave }) {
            const [nombre, setNombre] = useState('');
            const [cedula, setCedula] = useState('');
            const [telefono, setTelefono] = useState('');
            const [semestre, setSemestre] = useState('');
            const [tema, setTema] = useState('');

            const handleSubmit = () => {
                if(!nombre || !semestre || !tema) {
                    alert('Completa: nombre, semestre y tema');
                    return;
                }
                const radicado = generarRadicado('F1');
                onSave({
                    radicado_f1: radicado,
                    nombre,
                    cedula,
                    telefono,
                    semestre,
                    tema,
                    email
                });
                alert('✅ Radicación exitosa!\n\nRadicado: ' + radicado);
            };

            return e('div', { className: 'min-h-screen bg-gray-50' },
                e('header', { className: 'bg-gradient-to-r from-blue-700 to-blue-900 text-white shadow-lg' },
                    e('div', { className: 'max-w-6xl mx-auto px-4 py-6 flex justify-between items-center' },
                        e('h1', { className: 'text-2xl font-bold' }, 'FASE 1: Solicitud de Tutor'),
                        e('button', { onClick: onBack, className: 'px-4 py-2 bg-gray-700 hover:bg-gray-800 rounded-lg' }, '← ATRÁS')
                    )
                ),
                e('main', { className: 'max-w-4xl mx-auto px-4 py-8' },
                    e('div', { className: 'bg-white rounded-xl shadow-md p-8' },
                        e('h2', { className: 'text-2xl font-bold mb-6' }, 'Información del Integrante'),
                        e('div', { className: 'mb-6 p-6 bg-blue-50 rounded-lg border border-blue-200' },
                            e('h3', { className: 'text-lg font-bold mb-4' }, '👤 INTEGRANTE 1 *'),
                            e('div', { className: 'grid md:grid-cols-2 gap-4' },
                                e('input', { type: 'text', placeholder: 'Nombre completo', value: nombre, onChange: (x) => setNombre(x.target.value), className: 'px-4 py-2 border rounded-lg' }),
                                e('input', { type: 'text', placeholder: 'Cédula', value: cedula, onChange: (x) => setCedula(x.target.value), className: 'px-4 py-2 border rounded-lg' }),
                                e('input', { type: 'email', value: email, disabled: true, className: 'px-4 py-2 border rounded-lg bg-gray-100' }),
                                e('input', { type: 'tel', placeholder: 'Teléfono', value: telefono, onChange: (x) => setTelefono(x.target.value), className: 'px-4 py-2 border rounded-lg' }),
                                e('select', { value: semestre, onChange: (x) => setSemestre(x.target.value), className: 'px-4 py-2 border rounded-lg' },
                                    e('option', { value: '' }, 'Selecciona semestre'),
                                    [7,8,9,10,11,12].map(s => e('option', { key: s, value: s }, `Semestre ${s}`))
                                )
                            )
                        ),
                        e('div', { className: 'mb-6 p-6 bg-indigo-50 rounded-lg border border-indigo-200' },
                            e('h3', { className: 'text-lg font-bold mb-4' }, '📚 TEMA DEL TRABAJO *'),
                            e('input', { type: 'text', placeholder: 'Describe tu tema', value: tema, onChange: (x) => setTema(x.target.value), className: 'w-full px-4 py-2 border rounded-lg' })
                        ),
                        e('div', { className: 'flex gap-4' },
                            e('button', { onClick: onBack, className: 'flex-1 px-6 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-semibold' }, 'CANCELAR'),
                            e('button', { onClick: handleSubmit, className: 'flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold' }, '✓ ENVIAR RADICACIÓN')
                        )
                    )
                )
            );
        }

        function StudentPage({ email, onLogout }) {
            const [radicaciones, setRadicaciones] = useState(() => {
                const saved = localStorage.getItem('usc_radicaciones');
                return saved ? JSON.parse(saved) : [];
            });
            const [currentForm, setCurrentForm] = useState('dashboard');

            useEffect(() => {
                localStorage.setItem('usc_radicaciones', JSON.stringify(radicaciones));
            }, [radicaciones]);

            const estudianteRads = radicaciones.filter(r => r.email === email);
            const ultimaRad = estudianteRads[estudianteRads.length - 1];

            const handleSaveFase1 = (data) => {
                setRadicaciones([...radicaciones, data]);
                setCurrentForm('dashboard');
            };

            if(currentForm === 'fase1') {
                return e(StudentFase1, { email, onBack: () => setCurrentForm('dashboard'), onSave: handleSaveFase1 });
            }

            return e('div', { className: 'min-h-screen bg-gray-50' },
                e('header', { className: 'bg-gradient-to-r from-blue-700 to-blue-900 text-white shadow-lg' },
                    e('div', { className: 'max-w-6xl mx-auto px-4 py-6 flex justify-between items-center' },
                        e('div', {},
                            e('h1', { className: 'text-2xl font-bold' }, 'Mi Trabajo de Grado'),
                            e('p', { className: 'text-blue-100 text-sm' }, email)
                        ),
                        e('button', { onClick: onLogout, className: 'px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg' }, '🚪 Salir')
                    )
                ),
                e('main', { className: 'max-w-6xl mx-auto px-4 py-8' },
                    e('div', { className: 'grid md:grid-cols-3 gap-6' },
                        e('div', { className: `p-6 rounded-xl border-2 ${!ultimaRad ? 'bg-blue-100 border-blue-300' : 'bg-green-100 border-green-300'}` },
                            e('h3', { className: 'font-bold text-lg mb-2' }, '📄 FASE 1'),
                            e('p', { className: 'text-sm opacity-90 mb-4' }, 'Solicitud de Tutor'),
                            ultimaRad ? [
                                e('p', { className: 'text-sm font-semibold text-green-600 mb-2' }, '✓ RADIÇADA'),
                                e('p', { className: 'text-xs text-gray-600' }, 'Radicado: ' + ultimaRad.radicado_f1)
                            ] : e('button', { onClick: () => setCurrentForm('fase1'), className: 'w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700 font-semibold' }, '✓ RADICAR')
                        ),
                        e('div', { className: 'p-6 rounded-xl border-2 bg-gray-100 border-gray-300' },
                            e('h3', { className: 'font-bold text-lg mb-2' }, '📋 FASE 2'),
                            e('p', { className: 'text-sm opacity-90' }, 'Aval Protocolo'),
                            e('p', { className: 'text-xs text-gray-500 mt-4' }, 'Próximamente...')
                        ),
                        e('div', { className: 'p-6 rounded-xl border-2 bg-gray-100 border-gray-300' },
                            e('h3', { className: 'font-bold text-lg mb-2' }, '🎤 FASE 3'),
                            e('p', { className: 'text-sm opacity-90' }, 'Sustentación'),
                            e('p', { className: 'text-xs text-gray-500 mt-4' }, 'Próximamente...')
                        )
                    )
                )
            );
        }

        function AdminPage({ email, onLogout }) {
            const [radicaciones, setRadicaciones] = useState(() => {
                const saved = localStorage.getItem('usc_radicaciones');
                return saved ? JSON.parse(saved) : [];
            });

            return e('div', { className: 'min-h-screen bg-gray-50' },
                e('header', { className: 'bg-gradient-to-r from-blue-700 to-blue-900 text-white shadow-lg' },
                    e('div', { className: 'max-w-7xl mx-auto px-4 py-6 flex justify-between items-center' },
                        e('div', {},
                            e('h1', { className: 'text-3xl font-bold' }, 'Panel Coordinadora'),
                            e('p', { className: 'text-blue-100 text-sm' }, email)
                        ),
                        e('button', { onClick: onLogout, className: 'px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg' }, '🚪 Salir')
                    )
                ),
                e('main', { className: 'max-w-7xl mx-auto px-4 py-8' },
                    e('div', { className: 'bg-white rounded-xl shadow-md p-6' },
                        e('h2', { className: 'text-xl font-bold mb-4' }, '📊 FASE 1 - Solicitudes de Tutor'),
                        e('div', { className: 'overflow-x-auto' },
                            e('table', { className: 'w-full text-sm' },
                                e('thead', { className: 'bg-gray-100 border-b' },
                                    e('tr', {},
                                        e('th', { className: 'px-4 py-2 text-left' }, 'Radicado'),
                                        e('th', { className: 'px-4 py-2 text-left' }, 'Estudiante'),
                                        e('th', { className: 'px-4 py-2 text-left' }, 'Email'),
                                        e('th', { className: 'px-4 py-2 text-left' }, 'Tema'),
                                        e('th', { className: 'px-4 py-2 text-left' }, 'Semestre'),
                                        e('th', { className: 'px-4 py-2 text-center' }, 'Acción')
                                    )
                                ),
                                e('tbody', {},
                                    radicaciones.map((rad) =>
                                        e('tr', { key: rad.radicado_f1, className: 'border-b hover:bg-gray-50' },
                                            e('td', { className: 'px-4 py-2 font-semibold text-blue-600' }, rad.radicado_f1),
                                            e('td', { className: 'px-4 py-2' }, rad.nombre),
                                            e('td', { className: 'px-4 py-2' }, rad.email),
                                            e('td', { className: 'px-4 py-2' }, rad.tema),
                                            e('td', { className: 'px-4 py-2' }, rad.semestre),
                                            e('td', { className: 'px-4 py-2 text-center' },
                                                e('button', { className: 'px-3 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700 font-semibold' }, '✓ Aprobar')
                                            )
                                        )
                                    )
                                )
                            )
                        ),
                        radicaciones.length === 0 && e('p', { className: 'text-center text-gray-600 py-8' }, 'Sin radicaciones aún')
                    )
                )
            );
        }

        function App() {
            const [loggedIn, setLoggedIn] = useState(false);
            const [userType, setUserType] = useState(null);
            const [email, setEmail] = useState('');

            if(!loggedIn) {
                return e(LoginPage, { onLogin: (type, mail) => { setUserType(type); setEmail(mail); setLoggedIn(true); } });
            }

            if(userType === 'student') {
                return e(StudentPage, { email, onLogout: () => { setLoggedIn(false); setUserType(null); } });
            }

            if(userType === 'admin') {
                return e(AdminPage, { email, onLogout: () => { setLoggedIn(false); setUserType(null); } });
            }

            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(e(App));
    </script>
</body>
</html>
