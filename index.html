<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>USC - Radicación TG</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.min.js"></script>
</head>
<body class="bg-gray-100">
    <div id="root"></div>

    <script type="text/javascript">
        const { useState, useEffect } = React;

        function App() {
            const [loggedIn, setLoggedIn] = useState(false);
            const [userType, setUserType] = useState(null);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [showPassword, setShowPassword] = useState(false);
            const [radicaciones, setRadicaciones] = useState([]);
            const [currentForm, setCurrentForm] = useState('login');
            const [filtroBusqueda, setFiltroBusqueda] = useState('');
            const [tabActual, setTabActual] = useState('fase1');

            useEffect(() => {
                const saved = localStorage.getItem('usc_radicaciones');
                if (saved) setRadicaciones(JSON.parse(saved));
            }, []);

            useEffect(() => {
                localStorage.setItem('usc_radicaciones', JSON.stringify(radicaciones));
            }, [radicaciones]);

            const handleLogin = (e) => {
                e.preventDefault();
                if (!email || !password) {
                    alert('Completa todos los campos');
                    return;
                }

                if (email === 'investigacionmedicina@usc.edu.co' && password === 'Investigacion2026$') {
                    setUserType('admin');
                    setLoggedIn(true);
                    setCurrentForm('admin-dashboard');
                } else if (email.endsWith('@usc.edu.co')) {
                    setUserType('student');
                    setLoggedIn(true);
                    setCurrentForm('student-dashboard');
                } else {
                    alert('Email debe ser @usc.edu.co');
                }
            };

            const handleLogout = () => {
                setLoggedIn(false);
                setUserType(null);
                setEmail('');
                setPassword('');
                setCurrentForm('login');
            };

            const generarRadicado = (fase) => {
                const ahora = new Date();
                const año = ahora.getFullYear();
                const mes = String(ahora.getMonth() + 1).padStart(2, '0');
                const contador = Math.floor(Math.random() * 10000).toString().padStart(4, '0');
                return `USCTg-${fase}-${año}-${mes}-${contador}`;
            };

            // LOGIN
            if (!loggedIn) {
                return (
                    <div style={{background: 'linear-gradient(135deg, #003d82 0%, #1a5f9b 100%)'}} className="min-h-screen flex items-center justify-center p-4">
                        <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-8">
                            <div className="text-center mb-8">
                                <div className="w-16 h-16 bg-blue-600 rounded-lg mx-auto mb-4 flex items-center justify-center">
                                    <span className="text-white font-bold text-xl">USC</span>
                                </div>
                                <h1 className="text-3xl font-bold text-gray-800 mb-2">Radicación TG</h1>
                                <p className="text-gray-600 text-sm">Sistema 2026 - Medicina</p>
                            </div>

                            <form onSubmit={handleLogin} className="space-y-4">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Correo institucional</label>
                                    <input
                                        type="email"
                                        value={email}
                                        onChange={(e) => setEmail(e.target.value)}
                                        placeholder="tu@usc.edu.co"
                                        className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                    />
                                </div>

                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-2">Contraseña</label>
                                    <div className="relative">
                                        <input
                                            type={showPassword ? 'text' : 'password'}
                                            value={password}
                                            onChange={(e) => setPassword(e.target.value)}
                                            placeholder="••••••••"
                                            className="w-full px-4 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-600"
                                        />
                                        <button
                                            type="button"
                                            onClick={() => setShowPassword(!showPassword)}
                                            className="absolute right-3 top-2.5 text-gray-500"
                                        >
                                            {showPassword ? '🙈' : '👁️'}
                                        </button>
                                    </div>
                                </div>

                                <button type="submit" className="w-full bg-blue-600 text-white font-semibold py-2 rounded-lg hover:bg-blue-700 transition">
                                    Acceder
                                </button>
                            </form>

                            <div className="mt-6 p-4 bg-blue-50 rounded-lg border border-blue-200">
                                <p className="font-semibold text-blue-900 text-sm">ℹ️ Información:</p>
                                <p className="text-blue-800 text-sm mt-2">Coordinadora: Contacta al administrador</p>
                                <p className="text-blue-800 text-sm">Estudiante: Usa tu correo @usc.edu.co</p>
                            </div>
                        </div>
                    </div>
                );
            }

            // STUDENT DASHBOARD
            if (userType === 'student' && currentForm === 'student-dashboard') {
                const estudianteRads = radicaciones.filter(r => r.integrante1?.email_inst === email);
                const ultimaRad = estudianteRads[estudianteRads.length - 1];
                const ahora = new Date();
                const fase1Abierta = ahora.getDate() >= 1 && ahora.getDate() <= 5;

                return (
                    <div className="min-h-screen bg-gray-50">
                        <header className="bg-gradient-to-r from-blue-700 to-blue-900 text-white shadow-lg">
                            <div className="max-w-6xl mx-auto px-4 py-6 flex justify-between items-center">
                                <div>
                                    <h1 className="text-2xl font-bold">Mi Trabajo de Grado</h1>
                                    <p className="text-blue-100 text-sm">{email}</p>
                                </div>
                                <button onClick={handleLogout} className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg transition">
                                    🚪 Salir
                                </button>
                            </div>
                        </header>

                        <main className="max-w-6xl mx-auto px-4 py-8">
                            <div className="grid md:grid-cols-3 gap-6">
                                <div className={`p-6 rounded-xl border-2 ${fase1Abierta && !ultimaRad ? 'bg-blue-100 border-blue-300' : 'bg-gray-100 border-gray-300'}`}>
                                    <h3 className="font-bold text-lg mb-2">📄 FASE 1</h3>
                                    <p className="text-sm opacity-90 mb-4">Solicitud de Tutor</p>
                                    {fase1Abierta && !ultimaRad && (
                                        <button onClick={() => setCurrentForm('student-fase1')} className="w-full bg-blue-600 text-white py-2 rounded-lg hover:bg-blue-700">
                                            RADICAR
                                        </button>
                                    )}
                                    {ultimaRad && (
                                        <p className="text-sm font-semibold text-green-600">✓ Radicado: {ultimaRad.radicado_f1}</p>
                                    )}
                                </div>

                                <div className="p-6 rounded-xl border-2 bg-gray-100 border-gray-300">
                                    <h3 className="font-bold text-lg mb-2">📋 FASE 2</h3>
                                    <p className="text-sm opacity-90">Aval Protocolo</p>
                                </div>

                                <div className="p-6 rounded-xl border-2 bg-gray-100 border-gray-300">
                                    <h3 className="font-bold text-lg mb-2">🎤 FASE 3</h3>
                                    <p className="text-sm opacity-90">Sustentación</p>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // STUDENT FASE 1
            if (userType === 'student' && currentForm === 'student-fase1') {
                const [nombre, setNombre] = useState('');
                const [cedula, setCedula] = useState('');
                const [telefono, setTelefono] = useState('');
                const [semestre, setSemestre] = useState('');
                const [tema, setTema] = useState('');

                const handleSubmit = () => {
                    if (!nombre || !semestre || !tema) {
                        alert('Completa todos los campos');
                        return;
                    }

                    const radicadoF1 = generarRadicado('F1');
                    setRadicaciones([...radicaciones, {
                        id: Date.now(),
                        radicado_f1: radicadoF1,
                        integrante1: { nombre, cedula, email_inst: email, telefono, semestre },
                        tema,
                        fase1: { estado: 'pendiente' }
                    }]);
                    alert('✅ Radicación exitosa!\n\nRadicado: ' + radicadoF1);
                    setCurrentForm('student-dashboard');
                };

                return (
                    <div className="min-h-screen bg-gray-50">
                        <header className="bg-gradient-to-r from-blue-700 to-blue-900 text-white shadow-lg">
                            <div className="max-w-6xl mx-auto px-4 py-6 flex justify-between items-center">
                                <h1 className="text-2xl font-bold">FASE 1: Solicitud de Tutor</h1>
                                <button onClick={() => setCurrentForm('student-dashboard')} className="px-4 py-2 bg-gray-700 hover:bg-gray-800 rounded-lg">
                                    ← ATRÁS
                                </button>
                            </div>
                        </header>

                        <main className="max-w-4xl mx-auto px-4 py-8">
                            <div className="bg-white rounded-xl shadow-md p-8">
                                <h2 className="text-2xl font-bold mb-6">Información de Integrantes</h2>

                                <div className="mb-6 p-6 bg-blue-50 rounded-lg border border-blue-200">
                                    <h3 className="text-lg font-bold mb-4">👤 INTEGRANTE 1 *</h3>
                                    <div className="grid md:grid-cols-2 gap-4">
                                        <input type="text" placeholder="Nombre completo" value={nombre} onChange={(e) => setNombre(e.target.value)} className="px-4 py-2 border rounded-lg" />
                                        <input type="text" placeholder="Cédula" value={cedula} onChange={(e) => setCedula(e.target.value)} className="px-4 py-2 border rounded-lg" />
                                        <input type="email" value={email} disabled className="px-4 py-2 border rounded-lg bg-gray-100" />
                                        <input type="tel" placeholder="Teléfono" value={telefono} onChange={(e) => setTelefono(e.target.value)} className="px-4 py-2 border rounded-lg" />
                                        <select value={semestre} onChange={(e) => setSemestre(e.target.value)} className="px-4 py-2 border rounded-lg">
                                            <option value="">Semestre</option>
                                            {[7,8,9,10,11,12].map(s => <option key={s} value={s}>Semestre {s}</option>)}
                                        </select>
                                    </div>
                                </div>

                                <div className="mb-6 p-6 bg-indigo-50 rounded-lg border border-indigo-200">
                                    <h3 className="text-lg font-bold mb-4">📚 TEMA *</h3>
                                    <input type="text" placeholder="Tema del trabajo" value={tema} onChange={(e) => setTema(e.target.value)} className="w-full px-4 py-2 border rounded-lg" />
                                </div>

                                <div className="flex gap-4">
                                    <button onClick={() => setCurrentForm('student-dashboard')} className="flex-1 px-6 py-3 bg-gray-600 text-white rounded-lg hover:bg-gray-700 font-semibold">
                                        CANCELAR
                                    </button>
                                    <button onClick={handleSubmit} className="flex-1 px-6 py-3 bg-blue-600 text-white rounded-lg hover:bg-blue-700 font-semibold">
                                        ✓ ENVIAR
                                    </button>
                                </div>
                            </div>
                        </main>
                    </div>
                );
            }

            // ADMIN DASHBOARD
            if (userType === 'admin' && currentForm === 'admin-dashboard') {
                const radsFiltradas = radicaciones.filter(r => !filtroBusqueda || r.integrante1?.nombre?.toLowerCase().includes(filtroBusqueda.toLowerCase()));

                return (
                    <div className="min-h-screen bg-gray-50">
                        <header className="bg-gradient-to-r from-blue-700 to-blue-900 text-white shadow-lg">
                            <div className="max-w-7xl mx-auto px-4 py-6 flex justify-between items-center">
                                <div>
                                    <h1 className="text-3xl font-bold">Panel Coordinadora</h1>
                                    <p className="text-blue-100 text-sm">{email}</p>
                                </div>
                                <button onClick={handleLogout} className="px-4 py-2 bg-red-600 hover:bg-red-700 rounded-lg">
                                    🚪 Salir
                                </button>
                            </div>
                        </header>

                        <main className="max-w-7xl mx-auto px-4 py-8">
                            <div className="bg-white rounded-xl shadow-md p-6 mb-8">
                                <h2 className="text-xl font-bold mb-4">🔍 Filtros</h2>
                                <input type="text" placeholder="Buscar estudiante..." value={filtroBusqueda} onChange={(e) => setFiltroBusqueda(e.target.value)} className="w-full px-4 py-2 border rounded-lg" />
                            </div>

                            <div className="bg-white rounded-xl shadow-md p-6">
                                <h2 className="text-xl font-bold mb-4">FASE 1 - Solicitudes</h2>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-sm">
                                        <thead className="bg-gray-100">
                                            <tr>
                                                <th className="px-4 py-2 text-left">Radicado</th>
                                                <th className="px-4 py-2 text-left">Estudiante</th>
                                                <th className="px-4 py-2 text-left">Email</th>
                                                <th className="px-4 py-2 text-left">Tema</th>
                                                <th className="px-4 py-2 text-center">Acción</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {radsFiltradas.map((rad) => (
                                                <tr key={rad.id} className="border-b hover:bg-gray-50">
                                                    <td className="px-4 py-2 font-semibold">{rad.radicado_f1}</td>
                                                    <td className="px-4 py-2">{rad.integrante1?.nombre}</td>
                                                    <td className="px-4 py-2">{rad.integrante1?.email_inst}</td>
                                                    <td className="px-4 py-2">{rad.tema}</td>
                                                    <td className="px-4 py-2 text-center">
                                                        <button className="px-3 py-1 bg-green-600 text-white rounded text-xs hover:bg-green-700">
                                                            Aprobar
                                                        </button>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                                {radsFiltradas.length === 0 && <p className="text-center text-gray-600 py-8">Sin radicaciones</p>}
                            </div>
                        </main>
                    </div>
                );
            }

            return null;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
